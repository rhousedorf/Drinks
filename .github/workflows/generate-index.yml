name: Generate index.html for docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.html
        run: |
          set -e

          OUTPUT="docs/index.html"

          echo "<!DOCTYPE html>" > "$OUTPUT"
          echo "<html><head><meta charset='UTF-8'>" >> "$OUTPUT"
          echo "<meta name='viewport' content='width=device-width, initial-scale=1.0'>" >> "$OUTPUT"
          echo "<link rel='stylesheet' href='style.css'>" >> "$OUTPUT"
          echo "<title>Bob Drinks</title>" >> "$OUTPUT"

          echo "<style>
          body { font-family: Arial, sans-serif; padding: 20px; }
          details { margin-left: 20px; }
          summary { cursor: pointer; font-weight: bold; }
          a { text-decoration: none; }
          .file { margin-left: 20px; }
          #search { margin-bottom: 15px; padding: 5px; width: 300px; }
          </style>" >> "$OUTPUT"

          echo "<script>
          function filterFiles() {
            var input = document.getElementById('search').value.toLowerCase();
            var links = document.querySelectorAll('a');
            links.forEach(function(link) {
              var text = link.textContent.toLowerCase();
              link.parentElement.style.display = text.includes(input) ? '' : 'none';
            });
          }
          </script>" >> "$OUTPUT"

          echo "</head><body>" >> "$OUTPUT"
          echo "<h1>Bob Drinks</h1>" >> "$OUTPUT"
          echo "<input type='text' id='search' onkeyup='filterFiles()' placeholder='Search files...'>" >> "$OUTPUT"

          count_files() {
            find "$1" -type f -name "*.txt" | wc -l
          }

          render_dir() {
            local dir="$1"
            local rel="$2"
            local open_flag="$3"

            find "$dir" -mindepth 1 -maxdepth 1 -type d | sort -f | while read -r subdir; do
              name="$(basename "$subdir")"
              relpath="${rel}${name}"
              count="$(count_files "$subdir")"

              echo "<details ${open_flag}><summary>📁 ${name} (${count})</summary>" >> "$OUTPUT"
              render_dir "$subdir" "${relpath}/" ""
              echo "</details>" >> "$OUTPUT"
            done

            find "$dir" -mindepth 1 -maxdepth 1 -type f -name "*.txt" | sort -f | while read -r file; do
              name="$(basename "$file")"
              relpath="${rel}${name}"
              echo "<div class='file'>📄 <a href=\"./${relpath}\">${name}</a></div>" >> "$OUTPUT"
            done
          }

          render_dir "docs" "" ""

          echo "</body></html>" >> "$OUTPUT"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-generate docs/index.html"
            git push
          fi